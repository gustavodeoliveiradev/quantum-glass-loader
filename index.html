<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>Quantum Glass Loader — Loader Moderno com Glassmorphism e Upload Real</title>
    <meta name="description"
        content="Loader moderno e interativo com glassmorphism, progressão não-linear, upload real com drag & drop, áudio imersivo e tema dark/light. Projeto de 7 dias de aprendizado frontend.">
    <meta name="keywords"
        content="loader, glassmorphism, progress bar, upload, drag drop, web audio, theme toggle, frontend, pwa">
    <meta name="author" content="Gustavo de Oliveira">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Quantum Glass Loader">
    <meta property="og:description" content="Loader moderno com glassmorphism, upload real e áudio imersivo">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://gustavodeoliveiradev.github.io/quantum-glass-loader/">
    <meta property="og:image"
        content="https://gustavodeoliveiradev.github.io/quantum-glass-loader/assets/preview-dark.png">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Quantum Glass Loader">
    <meta name="twitter:description" content="Loader moderno com glassmorphism, upload real e áudio imersivo">
    <meta name="twitter:image"
        content="https://gustavodeoliveiradev.github.io/quantum-glass-loader/assets/preview-dark.png">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quantum Loader">

    <!-- Preconnect -->
    <link rel="preconnect" href="https://httpbin.org">
    <link rel="dns-prefetch" href="https://httpbin.org">

    <!-- CSS Modular -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/theme-toggle.css">
    <link rel="stylesheet" href="css/audio-controls.css">
    <link rel="stylesheet" href="css/glass-container.css">
    <link rel="stylesheet" href="css/progress-ring.css">
    <link rel="stylesheet" href="css/typography.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/upload-zone.css">
    <link rel="stylesheet" href="css/file-list.css">
    <link rel="stylesheet" href="css/disclaimer.css">
    <link rel="stylesheet" href="css/performance-panel.css">
    <link rel="stylesheet" href="css/pwa-install.css">
    <link rel="stylesheet" href="css/offline-toast.css">
    <link rel="stylesheet" href="css/cursor-effects.css">
    <link rel="stylesheet" href="css/background-particles.css">
    <link rel="stylesheet" href="css/state-transitions.css">
    <link rel="stylesheet" href="css/completion-celebration.css">
</head>

<body>
    <!-- Skip Link para acessibilidade -->
    <a href="#main-loader" class="sr-only skip-link">Pular para o loader principal</a>

    <!-- Background -->
    <div class="bg-mesh" aria-hidden="true"></div>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <!-- Audio Controls -->
    <div class="audio-controls" id="audio-controls">
        <button class="audio-toggle muted" id="audio-toggle" title="Ativar som">
            🔇
        </button>
        <div class="audio-visualizer" id="audio-visualizer">
            <div class="audio-bar" style="height: 4px;"></div>
            <div class="audio-bar" style="height: 8px;"></div>
            <div class="audio-bar" style="height: 6px;"></div>
            <div class="audio-bar" style="height: 10px;"></div>
            <div class="audio-bar" style="height: 5px;"></div>
        </div>
    </div>

    <!-- Disclaimer (renderizado via JS) -->

    <!-- Loader Principal -->
    <main class="glass-container" id="main-loader" role="progressbar" aria-valuemin="0" aria-valuemax="100"
        aria-valuenow="0" aria-label="Carregando conteúdo">

        <!-- Anel de Progresso -->
        <div class="progress-ring-wrapper">
            <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00d4ff" />
                        <stop offset="100%" stop-color="#7b2cbf" />
                    </linearGradient>
                    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur" />
                        <feMerge>
                            <feMergeNode in="coloredBlur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
                <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
                <circle class="ring-fill" cx="100" cy="100" r="90" id="ring-fill"></circle>
            </svg>

            <div class="ring-glow" id="ring-glow"></div>
            <div class="progress-value" id="progress-value">0%</div>

            <div class="state-icon success" id="icon-success">✓</div>
            <div class="state-icon error" id="icon-error">✕</div>
        </div>

        <!-- Status -->
        <div class="status-area">
            <div class="status-step" id="status-step">Inicializando</div>
            <div class="status-message" id="status-message">Clique no 🔇 para ativar o som</div>
        </div>

        <!-- Progresso Linear -->
        <div class="linear-track" aria-hidden="true">
            <div class="linear-bar" id="linear-bar"></div>
        </div>

        <!-- Upload Zone (inserido via JS) -->
        <!-- File List (inserido via JS) -->

        <!-- Controles -->
        <div class="controls">
            <button class="btn btn-secondary" id="btn-pause" type="button">Pausar</button>
            <button class="btn btn-primary" id="btn-error" type="button">Simular Erro</button>
            <button class="btn btn-secondary" id="btn-restart" type="button" hidden>Reiniciar</button>
        </div>
    </main>

    <!-- Scripts Modulares -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/theme-manager.js"></script>
    <script src="js/disclaimer.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/animation-engine.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/ui-updater.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/upload-manager.js"></script>
    <script src="js/performance-monitor.js"></script>
    <script src="js/pwa-manager.js"></script>
    <script src="js/cursor-effects.js"></script>
    <script src="js/background-particles.js"></script>
    <script src="js/completion-celebration.js"></script>
    <script src="js/main.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('js/service-worker.js')
                .then(reg => {
                    console.log('✅ SW registered:', reg.scope);

                    // Verificar updates a cada 1 hora
                    setInterval(() => {
                        reg.update();
                    }, 3600000);
                })
                .catch(err => console.log('❌ SW registration failed:', err));
        }
    </script>
</body>

</html>
